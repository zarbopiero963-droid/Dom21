name: Build SuperAgent V8.5 EXE

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["V4 Test Suite"]
    types: [completed]
    branches: [main]

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install --prefer-binary -r requirements.txt
          pip install pyinstaller
          pip install playwright

      - name: Install Playwright Browsers
        run: python -m playwright install chromium

      - name: Create Missing Folders
        run: |
          if (-not (Test-Path "config")) { mkdir config }
          if (-not (Test-Path "data")) { mkdir data }
          if (-not (Test-Path "logs")) { mkdir logs }

      - name: Build with PyInstaller
        # 🛡️ COMANDO HEDGE-GRADE (LTM) CON COLLECT-ALL
        run: pyinstaller --name "Dom21" --onefile --windowed --collect-all playwright --collect-all PySide6 main.py

      - name: Verify Build Existence
        run: |
          if (Test-Path "dist/Dom21.exe") {
              Write-Host "Build trovato con successo!"
          } else {
              Write-Error "ERRORE: File .exe non trovato nella cartella dist/"
              exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dom21_Windows_EXE
          path: dist/Dom21.exe
          retention-days: 3
